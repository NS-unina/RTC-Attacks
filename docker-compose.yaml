services:
  ttyd:
    container_name: ttyd
    build: ./ttyd
    image: ttyd
    command: ttyd --writable bash
    ports:
      - 7681:7681
      - 8000:8000
    stdin_open: true
    tty: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    
  mongo:
    container_name: mongo
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - 27017:27017
