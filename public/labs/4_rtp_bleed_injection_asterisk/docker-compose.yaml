services:
  asterisk:
    container_name: asterisk
    build: ./asterisk
    image: asterisk
    command: /usr/local/bin/asterisk-entrypoint.sh asterisk -f -vv
    tty: true
    environment:
      EXTERNAL_IP: 10.10.0.5
      LOCAL_NET: 10.10.0.0/24
    volumes:
      - ./asterisk/config:/etc/asterisk
      - ./recordings:/var/spool/asterisk/monitor
    ports:
      - "5060:5060/udp"
      - "10000-10099:10000-10099/udp"
      - "3003:3000"
      - "3004:3001"
    networks:
      lab_net:
        ipv4_address: 10.10.0.5

