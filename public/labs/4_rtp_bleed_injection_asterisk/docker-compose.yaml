  baresip-cli-7001:
    container_name: baresip-cli-7001
    build: ./baresip-cli
    image: baresip-cli
    tty: true
    environment:
      TZ: Europe/Rome
      SIP_DOMAIN: 10.10.0.5
      SIP_USERNAME: 7001
      SIP_PASSWORD: 7001
      AUTOANSWER: "false"
      AUDIO_SOURCE_FILE: /media/audio_benign.wav
    volumes:
      - baresip_cli_7001_data:/data
      - ./audio_benign.wav:/media/audio_benign.wav:ro
      - ./recordings/baresip-cli-7001:/captures
    depends_on:
      - asterisk
    networks:
      lab_net:
        ipv4_address: 10.10.0.41

  baresip-cli-7002:
    container_name: baresip-cli-7002
    build: ./baresip-cli
    image: baresip-cli
    tty: true
    environment:
      TZ: Europe/Rome
      SIP_DOMAIN: 10.10.0.5
      SIP_USERNAME: 7002
      SIP_PASSWORD: 7002
      AUTOANSWER: "true"
      AUDIO_SOURCE_FILE: /media/audio_benign.wav
    volumes:
      - baresip_cli_7002_data:/data
      - ./audio_benign.wav:/media/audio_benign.wav:ro
      - ./recordings/baresip-cli-7002:/captures
    depends_on:
      - asterisk
    networks:
      lab_net:
        ipv4_address: 10.10.0.42

  sippts:
    container_name: sippts
    build: ./sippts
    image: sippts
    privileged: true
    tty: true
    volumes:
      - ./audio_inject.wav:/audio.wav       # compatibility path for rtpbleedinject
      - ./audio_inject.wav:/audio_inject.wav
      - ./audio_fixed.wav:/audio_fixed.wav
      - ./audio_raw.raw:/audio.raw
    networks:
      lab_net:
        ipv4_address: 10.10.0.20

  wireshark:
    container_name: wireshark
    build: ./wireshark
    image: wireshark
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Rome
      PIXELFLUX_WAYLAND: "false"
    # volumes:
    #   - wireshark_config:/config
    network_mode: "service:asterisk"
    cap_add:
      - NET_ADMIN
    privileged: true
    shm_size: "2gb"
    depends_on:
      - asterisk

volumes:
  linphone_7001_config:
  linphone_7002_config:
  linphone_cli_7001_data:
  linphone_cli_7002_data:
  baresip_cli_7001_data:
  baresip_cli_7002_data:
  wireshark_config:

networks:
  lab_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24
