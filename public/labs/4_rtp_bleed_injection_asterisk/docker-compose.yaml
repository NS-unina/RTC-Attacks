services:
  asterisk:
    build: ./asterisk
    image: asterisk
    command: /usr/local/bin/asterisk-entrypoint.sh asterisk -f -vv
    tty: true
    environment:
      EXTERNAL_IP: ${ASTERISK_IP:-10.10.0.5}
      LOCAL_NET: ${LAB_SUBNET:-10.10.0.0/24}
    volumes:
    - ./asterisk/config:/etc/asterisk
    - ${RECORDINGS_DIR:-./recordings}:/var/spool/asterisk/monitor
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    # ports:
    # - ${SIP_HOST_PORT:-5060}:5060/udp
    # - ${RTP_HOST_RANGE:-10000-10099}:10000-10099/udp
    # - ${ASTERISK_HTTP_PORT:-3003}:3000
    # - ${ASTERISK_ALT_HTTP_PORT:-3004}:3001
    networks:
      lab_net:
        ipv4_address: ${ASTERISK_IP:-10.10.0.5}
  baresip-cli-7001:
    build: ./baresip-cli
    image: baresip-cli
    tty: true
    environment:
      TZ: Europe/Rome
      SIP_DOMAIN: ${ASTERISK_IP:-10.10.0.5}
      SIP_USERNAME: 7001
      SIP_PASSWORD: 7001
      AUTOANSWER: 'false'
      AUDIO_SOURCE_FILE: /media/audio_benign.wav
    volumes:
    - baresip_cli_7001_data:/data
    - ./audio_benign.wav:/media/audio_benign.wav:ro
    - ${RECORDINGS_DIR:-./recordings}/baresip-cli-7001:/captures
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    depends_on:
    - asterisk
    networks:
      lab_net:
        ipv4_address: ${BARESIP_7001_IP:-10.10.0.41}
  baresip-cli-7002:
    build: ./baresip-cli
    image: baresip-cli
    tty: true
    environment:
      TZ: Europe/Rome
      SIP_DOMAIN: ${ASTERISK_IP:-10.10.0.5}
      SIP_USERNAME: 7002
      SIP_PASSWORD: 7002
      AUTOANSWER: 'true'
      AUDIO_SOURCE_FILE: /media/audio_benign.wav
    volumes:
    - baresip_cli_7002_data:/data
    - ./audio_benign.wav:/media/audio_benign.wav:ro
    - ${RECORDINGS_DIR:-./recordings}/baresip-cli-7002:/captures
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    depends_on:
    - asterisk
    networks:
      lab_net:
        ipv4_address: ${BARESIP_7002_IP:-10.10.0.42}
  sippts:
    build: ./sippts
    image: sippts
    privileged: true
    tty: true
    volumes:
    - ./audio_inject.wav:/audio.wav
    - ./audio_inject.wav:/audio_inject.wav
    - ./audio_fixed.wav:/audio_fixed.wav
    - ./audio_raw.raw:/audio.raw
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
    networks:
      lab_net:
        ipv4_address: ${SIPPTS_IP:-10.10.0.20}
  wireshark:
    build: ./wireshark
    image: wireshark
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Rome
      PIXELFLUX_WAYLAND: 'false'
    network_mode: service:asterisk
    cap_add:
    - NET_ADMIN
    privileged: true
    shm_size: 2gb
    depends_on:
    - asterisk
    volumes:
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro
volumes:
  linphone_7001_config: null
  linphone_7002_config: null
  linphone_cli_7001_data: null
  linphone_cli_7002_data: null
  baresip_cli_7001_data: null
  baresip_cli_7002_data: null
  wireshark_config: null
networks:
  lab_net:
    driver: bridge
    ipam:
      config:
      - subnet: ${LAB_SUBNET:-10.10.0.0/24}
